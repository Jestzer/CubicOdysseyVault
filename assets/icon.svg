<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Isometric cube divided into a 2x2 voxel grid on each visible face,
       with a single red accent voxel on the top face (front quadrant).
       Cube fills ~85% of the canvas. -->

  <!-- Top face (lightest): top, top-right, front-center, top-left -->
  <polygon points="128,16 238,80 128,144 18,80"
           fill="#6B6B70" stroke="#1A1A1C" stroke-width="3" stroke-linejoin="round"/>

  <!-- Front-right face (medium) -->
  <polygon points="238,80 238,208 128,240 128,144"
           fill="#3F3F45" stroke="#1A1A1C" stroke-width="3" stroke-linejoin="round"/>

  <!-- Front-left face (darkest) -->
  <polygon points="18,80 128,144 128,240 18,208"
           fill="#2A2A2D" stroke="#1A1A1C" stroke-width="3" stroke-linejoin="round"/>

  <!-- Sub-grid on top face -->
  <line x1="183" y1="48" x2="73"  y2="112" stroke="#525258" stroke-width="2"/>
  <line x1="73"  y1="48" x2="183" y2="112" stroke="#525258" stroke-width="2"/>

  <!-- Sub-grid on front-right face -->
  <line x1="238" y1="144" x2="128" y2="176" stroke="#303035" stroke-width="2"/>
  <line x1="183" y1="112" x2="183" y2="224" stroke="#303035" stroke-width="2"/>

  <!-- Sub-grid on front-left face -->
  <line x1="18"  y1="144" x2="128" y2="176" stroke="#1F1F22" stroke-width="2"/>
  <line x1="73"  y1="112" x2="73"  y2="224" stroke="#1F1F22" stroke-width="2"/>

  <!-- Red accent voxel: front sub-rhombus on the top face -->
  <polygon points="128,80 183,112 128,144 73,112"
           fill="#C62828" stroke="#1A1A1C" stroke-width="2" stroke-linejoin="round"/>
</svg>
